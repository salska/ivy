name: SpecFlow
version: 0.1.0
type: skill
tier: community

author:
  name: jcfischer
  github: jcfischer

provides:
  skill:
    - trigger: "specflow"
    - trigger: "spec"
    - trigger: "specify"
    - trigger: "implement feature"
    - trigger: "gated workflow"
  cli:
    - command: "bun packages/specflow/src/index.ts"
      name: "specflow"

depends_on:
  tools:
    - name: bun
      version: ">=1.0.0"

capabilities:
  filesystem:
    read:
      - ".specflow/"
      - ".specify/"
      - "~/.config/specflow/"
    write:
      - ".specflow/"
      - ".specify/"
      - "~/.config/specflow/"
  network: []
  bash:
    allowed: true
    restricted_to:
      - "bun packages/specflow/src/index.ts *"
      - "specflow *"
  secrets: []
