<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <defs>
    <!-- Orange diamond gradient matching existing style -->
    <linearGradient id="orangeDiamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8c45c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8941a;stop-opacity:1" />
    </linearGradient>
    <!-- Small orange diamond gradient for gates -->
    <linearGradient id="orangeDiamondSmall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8c45c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:1" />
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a9fd4" />
    </marker>
    <!-- Feedback arrow marker (lighter) -->
    <marker id="arrowFeedback" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7ab8e0" />
    </marker>
    <!-- Drop shadow for boxes -->
    <filter id="boxShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#b0b0b0" flood-opacity="0.3"/>
    </filter>
    <filter id="bigBoxShadow" x="-3%" y="-3%" width="108%" height="108%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#a0a0a0" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="700" fill="#dddde1" rx="0"/>

  <!-- Title: italic serif matching existing style -->
  <text x="50" y="62" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="bold" font-style="italic" fill="#1a3a5c">SpecFlow: Full Lifecycle</text>
  <text x="50" y="95" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#5a6a7a" font-style="normal">From specification to contribution-ready release</text>

  <!-- ============================================ -->
  <!-- MAIN PIPELINE: 6 phase nodes                 -->
  <!-- Y center of main pipeline = 290              -->
  <!-- ============================================ -->

  <!-- Phase 1: SPECIFY -->
  <rect x="40" y="262" width="130" height="56" rx="10" fill="white" stroke="#5a9fd4" stroke-width="1.8" filter="url(#boxShadow)"/>
  <text x="105" y="296" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a3a5c" text-anchor="middle">SPECIFY</text>

  <!-- Arrow: SPECIFY -> diamond 1 -->
  <line x1="170" y1="290" x2="202" y2="290" stroke="#5a9fd4" stroke-width="2.2" marker-end="url(#arrowhead)"/>

  <!-- Diamond 1: spec-quality 80% -->
  <g transform="translate(230, 290)">
    <rect x="-20" y="-20" width="40" height="40" rx="3" fill="url(#orangeDiamond)" transform="rotate(45)" stroke="#e8941a" stroke-width="0.5"/>
  </g>
  <text x="230" y="336" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e8941a" text-anchor="middle">spec-quality 80%</text>

  <!-- Arrow: diamond 1 -> PLAN -->
  <line x1="258" y1="290" x2="290" y2="290" stroke="#5a9fd4" stroke-width="2.2" marker-end="url(#arrowhead)"/>
  <!-- Curved feedback arrow below diamond 1 -->
  <path d="M 230 316 C 230 360, 105 360, 105 318" stroke="#7ab8e0" stroke-width="1.8" fill="none" marker-end="url(#arrowFeedback)" opacity="0.7"/>

  <!-- Phase 2: PLAN -->
  <rect x="295" y="262" width="110" height="56" rx="10" fill="white" stroke="#5a9fd4" stroke-width="1.8" filter="url(#boxShadow)"/>
  <text x="350" y="296" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a3a5c" text-anchor="middle">PLAN</text>

  <!-- Arrow: PLAN -> diamond 2 -->
  <line x1="405" y1="290" x2="437" y2="290" stroke="#5a9fd4" stroke-width="2.2" marker-end="url(#arrowhead)"/>

  <!-- Diamond 2: plan-quality 80% -->
  <g transform="translate(465, 290)">
    <rect x="-20" y="-20" width="40" height="40" rx="3" fill="url(#orangeDiamond)" transform="rotate(45)" stroke="#e8941a" stroke-width="0.5"/>
  </g>
  <text x="465" y="336" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e8941a" text-anchor="middle">plan-quality 80%</text>

  <!-- Arrow: diamond 2 -> TASKS -->
  <line x1="493" y1="290" x2="525" y2="290" stroke="#5a9fd4" stroke-width="2.2" marker-end="url(#arrowhead)"/>
  <!-- Curved feedback arrow below diamond 2 -->
  <path d="M 465 316 C 465 364, 350 364, 350 318" stroke="#7ab8e0" stroke-width="1.8" fill="none" marker-end="url(#arrowFeedback)" opacity="0.7"/>

  <!-- "Never skip phases" callout between PLAN and TASKS diamonds -->
  <text x="465" y="205" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="bold" fill="#e8941a" text-anchor="middle">Never skip phases</text>
  <!-- Small downward arrow from callout to pipeline -->
  <line x1="465" y1="212" x2="465" y2="258" stroke="#e8941a" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Phase 3: TASKS -->
  <rect x="530" y="262" width="110" height="56" rx="10" fill="white" stroke="#5a9fd4" stroke-width="1.8" filter="url(#boxShadow)"/>
  <text x="585" y="296" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a3a5c" text-anchor="middle">TASKS</text>

  <!-- Arrow: TASKS -> diamond 3 -->
  <line x1="640" y1="290" x2="672" y2="290" stroke="#5a9fd4" stroke-width="2.2" marker-end="url(#arrowhead)"/>

  <!-- Diamond 3: tasks-quality 80% -->
  <g transform="translate(700, 290)">
    <rect x="-20" y="-20" width="40" height="40" rx="3" fill="url(#orangeDiamond)" transform="rotate(45)" stroke="#e8941a" stroke-width="0.5"/>
  </g>
  <text x="700" y="336" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e8941a" text-anchor="middle">tasks-quality 80%</text>

  <!-- Arrow: diamond 3 -> IMPLEMENT -->
  <line x1="728" y1="290" x2="760" y2="290" stroke="#5a9fd4" stroke-width="2.2" marker-end="url(#arrowhead)"/>
  <!-- Curved feedback arrow below diamond 3 -->
  <path d="M 700 316 C 700 364, 585 364, 585 318" stroke="#7ab8e0" stroke-width="1.8" fill="none" marker-end="url(#arrowFeedback)" opacity="0.7"/>

  <!-- Phase 4: IMPLEMENT -->
  <rect x="765" y="262" width="140" height="56" rx="10" fill="white" stroke="#5a9fd4" stroke-width="1.8" filter="url(#boxShadow)"/>
  <text x="835" y="296" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a3a5c" text-anchor="middle">IMPLEMENT</text>

  <!-- Arrow: IMPLEMENT -> CONTRIB-PREP -->
  <line x1="905" y1="290" x2="960" y2="290" stroke="#5a9fd4" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- ============================================ -->
  <!-- CONTRIB-PREP: Expanded node with 5 gates     -->
  <!-- ============================================ -->

  <!-- Outer container for CONTRIB-PREP -->
  <rect x="968" y="140" width="250" height="348" rx="12" fill="white" stroke="#5a9fd4" stroke-width="2.2" filter="url(#bigBoxShadow)"/>
  <!-- Header label -->
  <text x="1093" y="171" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a3a5c" text-anchor="middle">CONTRIB-PREP</text>
  <!-- Thin separator line -->
  <line x1="985" y1="183" x2="1201" y2="183" stroke="#d0d8e0" stroke-width="1"/>

  <!-- Gate 1: Inventory -->
  <g>
    <rect x="1003" y="198" width="14" height="14" rx="1" fill="url(#orangeDiamondSmall)" transform="rotate(45, 1010, 205)" stroke="#e8941a" stroke-width="0.4"/>
    <text x="1032" y="209" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a3a5c">Gate 1</text>
    <text x="1094" y="209" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#5a6a7a">Inventory</text>
    <text x="1032" y="224" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#8a9aaa" font-style="italic">file classification</text>
  </g>

  <!-- Vertical connector gate 1->2 -->
  <line x1="1010" y1="226" x2="1010" y2="246" stroke="#5a9fd4" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Gate 2: Sanitize -->
  <g>
    <rect x="1003" y="250" width="14" height="14" rx="1" fill="url(#orangeDiamondSmall)" transform="rotate(45, 1010, 257)" stroke="#e8941a" stroke-width="0.4"/>
    <text x="1032" y="261" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a3a5c">Gate 2</text>
    <text x="1094" y="261" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#5a6a7a">Sanitize</text>
    <text x="1032" y="276" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#8a9aaa" font-style="italic">secret scanning</text>
  </g>

  <!-- Vertical connector gate 2->3 -->
  <line x1="1010" y1="278" x2="1010" y2="298" stroke="#5a9fd4" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Gate 3: Pre-Extract -->
  <g>
    <rect x="1003" y="302" width="14" height="14" rx="1" fill="url(#orangeDiamondSmall)" transform="rotate(45, 1010, 309)" stroke="#e8941a" stroke-width="0.4"/>
    <text x="1032" y="313" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a3a5c">Gate 3</text>
    <text x="1094" y="313" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#5a6a7a">Pre-Extract</text>
    <text x="1032" y="328" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#8a9aaa" font-style="italic">human approval</text>
  </g>

  <!-- Vertical connector gate 3->4 -->
  <line x1="1010" y1="330" x2="1010" y2="350" stroke="#5a9fd4" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Gate 4: Post-Extract -->
  <g>
    <rect x="1003" y="354" width="14" height="14" rx="1" fill="url(#orangeDiamondSmall)" transform="rotate(45, 1010, 361)" stroke="#e8941a" stroke-width="0.4"/>
    <text x="1032" y="365" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a3a5c">Gate 4</text>
    <text x="1094" y="365" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#5a6a7a">Post-Extract</text>
    <text x="1032" y="380" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#8a9aaa" font-style="italic">branch review</text>
  </g>

  <!-- Vertical connector gate 4->5 -->
  <line x1="1010" y1="382" x2="1010" y2="402" stroke="#5a9fd4" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Gate 5: Verify -->
  <g>
    <rect x="1003" y="406" width="14" height="14" rx="1" fill="url(#orangeDiamondSmall)" transform="rotate(45, 1010, 413)" stroke="#e8941a" stroke-width="0.4"/>
    <text x="1032" y="417" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a3a5c">Gate 5</text>
    <text x="1094" y="417" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#5a6a7a">Verify</text>
    <text x="1032" y="432" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#8a9aaa" font-style="italic">completeness check</text>
  </g>

  <!-- Arrow: CONTRIB-PREP -> RELEASE -->
  <line x1="1218" y1="290" x2="1260" y2="290" stroke="#5a9fd4" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Phase 6: RELEASE -->
  <rect x="1268" y="262" width="110" height="56" rx="10" fill="white" stroke="#5a9fd4" stroke-width="1.8" filter="url(#boxShadow)"/>
  <text x="1323" y="296" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a3a5c" text-anchor="middle">RELEASE</text>

  <!-- ============================================ -->
  <!-- Legend area                                   -->
  <!-- ============================================ -->
  <g transform="translate(50, 550)">
    <!-- Diamond legend -->
    <rect x="0" y="0" width="12" height="12" rx="1" fill="url(#orangeDiamondSmall)" transform="rotate(45, 6, 6)" stroke="#e8941a" stroke-width="0.4"/>
    <text x="22" y="10" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#5a6a7a">= Quality gate (automated score check)</text>

    <!-- Feedback arrow legend -->
    <path d="M 300 -2 C 300 16, 322 16, 322 -2" stroke="#7ab8e0" stroke-width="1.8" fill="none" marker-end="url(#arrowFeedback)" opacity="0.7"/>
    <text x="340" y="10" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#5a6a7a">= Feedback loop on gate failure</text>

    <!-- Dashed line legend -->
    <line x1="580" y1="5" x2="610" y2="5" stroke="#5a9fd4" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="620" y="10" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#5a6a7a">= Sequential gate progression</text>
  </g>

  <!-- ============================================ -->
  <!-- Bottom annotation bar                        -->
  <!-- ============================================ -->
  <rect x="40" y="600" width="1320" height="52" rx="8" fill="#1a3a5c" opacity="0.08"/>
  <text x="700" y="627" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#e8941a" text-anchor="middle">Hard gates = halt on fail | Human approval required at every gate</text>
  <text x="700" y="645" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#5a6a7a" text-anchor="middle">Each quality gate must pass before proceeding to the next phase</text>

</svg>